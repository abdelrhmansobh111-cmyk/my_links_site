<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>My Links</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <img src="{{ url_for('static', filename='me.jpeg') }}" class="profile">

        <h1>Abdelrhman 🔥</h1>
        
        {% for link in links %}
            <a href="{{ link.url }}" target="_blank" class="btn">
                {{ link.name }}
            </a>
        {% endfor %}
    </div>

</body>
</html>
